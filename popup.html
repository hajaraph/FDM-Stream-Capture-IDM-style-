<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            width: 380px;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-height: 520px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        header {
            padding: 16px;
            background: var(--surface);
            backdrop-filter: blur(16px) saturate(140%);
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand { display: flex; align-items: center; gap: 12px; }

        .logo {
            width: 32px; height: 32px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow-glow);
        }

        .logo svg { width: 18px; height: 18px; color: white; }

        #header-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }

        .search-container {
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-wrapper svg {
            position: absolute;
            left: 10px;
            width: 14px;
            height: 14px;
            color: var(--text-muted);
        }

        #stream-search {
            width: 100%;
            padding: 8px 12px 8px 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface-solid);
            color: var(--text);
            font-size: 12px;
            outline: none;
            transition: all 0.2s ease;
        }

        #stream-search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        #stream-list {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            min-height: 200px;
        }

        #stream-list::-webkit-scrollbar { width: 5px; }
        #stream-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }

        .tl-section { margin-bottom: 20px; }

        .tl-label {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.05em; color: var(--text-muted);
            margin-bottom: 10px; padding-left: 4px;
        }

        .tl-item {
            margin-bottom: 10px;
            animation: slideIn 0.3s var(--ease) both;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tl-card {
            background: var(--surface);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), transform 0.2s var(--ease);
            position: relative;
            overflow: hidden;
        }

        .tl-card:hover {
            border-color: var(--border-strong);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .tl-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
        .tl-card-meta { display: flex; align-items: center; gap: 8px; }

        .tl-type-badge {
            font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px;
            color: white; text-transform: uppercase;
        }

        .tl-type-badge.youtube { background: var(--type-youtube); }
        .tl-type-badge.manifests { background: var(--type-manifests); }
        .tl-type-badge.videos { background: var(--type-videos); }
        .tl-type-badge.segments { background: var(--type-segments); }
        .tl-type-badge.others { background: var(--type-others); }

        .tl-time { font-size: 10px; color: var(--text-muted); font-weight: 500; }

        .tl-title {
            font-size: 13px; font-weight: 600; color: var(--text);
            margin-bottom: 4px; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            line-clamp: 2;
        }

        .tl-url {
            font-size: 9px; color: var(--text-muted);
            font-family: inherit;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            background: var(--surface-hover); padding: 2px 6px; border-radius: 4px;
        }

        .tl-actions { display: flex; gap: 8px; margin-top: 10px; }

        .tl-btn {
            flex: 1; padding: 8px; border-radius: 8px; border: none;
            font-size: 11px; font-weight: 600; cursor: pointer;
            transition: all 0.15s ease; display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        .tl-btn svg { width: 14px; height: 14px; }

        .tl-btn-dl { background: var(--accent); color: var(--on-accent); }
        .tl-btn-dl:hover { box-shadow: var(--shadow-glow); filter: brightness(1.05); }
        .tl-btn-dl:active { transform: scale(0.97); }
        .tl-btn-dl:disabled { opacity: 0.6; cursor: default; filter: none; box-shadow: none; }

        .tl-btn-cp { background: var(--surface-hover); color: var(--text-secondary); }
        .tl-btn-cp:hover { background: var(--border-strong); color: var(--text); }

        .footer {
            padding: 14px 16px; border-top: 1px solid var(--border);
            background: var(--surface); backdrop-filter: blur(16px) saturate(140%);
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            display: flex; gap: 8px;
        }

        .btn-footer {
            flex: 1; padding: 10px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--surface-solid);
            color: var(--text-secondary); font-size: 11px; font-weight: 600;
            cursor: pointer; transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
        }

        .btn-footer:hover { border-color: var(--border-strong); background: var(--surface-hover); }
        .btn-footer.solid { background: var(--accent); color: var(--on-accent); border-color: transparent; }
        .btn-footer.solid:hover { box-shadow: var(--shadow-glow); filter: brightness(1.05); }

        /* Feature 2 — taille fichier */
        .tl-size {
            font-size: 10px; font-weight: 600; color: var(--text-muted);
            background: var(--surface-hover); padding: 2px 6px; border-radius: 4px;
        }

        /* Feature 3 — sélecteur qualité HLS */
        .quality-picker { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
        .quality-picker-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
        .quality-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .quality-btn {
            padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--surface-solid); color: var(--text-secondary);
            font-size: 11px; font-weight: 600; cursor: pointer;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
        }
        .quality-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
        .quality-btn.best { border-color: var(--accent); color: var(--accent); }
        .quality-loading { font-size: 11px; color: var(--text-muted); padding: 4px 0; }

        .empty { text-align: center; padding: 60px 40px; color: var(--text-muted); }
        .empty svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.15; }
        .empty p { font-size: 13px; font-weight: 500; }

        /* Icon Button */
        .icon-btn {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: none; border: none; cursor: pointer;
            color: var(--text-secondary); border-radius: 8px; transition: all 0.15s;
        }
        .icon-btn:hover { background: var(--accent-soft); color: var(--accent); }

        /* Custom Checkbox */
        .checkbox-wrapper { display: flex; align-items: center; cursor: pointer; }
        .cb-batch { position: absolute; opacity: 0; width: 0; }
        .cb-visual {
            width: 20px; height: 20px; border: 2px solid var(--border-strong); border-radius: 6px;
            background-color: var(--surface-solid); display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .cb-batch:checked + .cb-visual { background-color: var(--accent); border-color: var(--accent); }
        .cb-batch:checked + .cb-visual::after { content: "✓"; color: white; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </div>
            <span id="header-title">FDM Stream Capture</span>
        </div>
        <button id="open-settings" class="icon-btn" title="Paramètres">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </header>

    <div class="search-container">
        <div class="search-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="stream-search" placeholder="Rechercher un flux...">
        </div>
    </div>

    <div id="stream-list"></div>

    <div class="footer">
        <button id="btn-scan-page" class="btn-footer">Scanner</button>
        <button id="btn-show-cart" class="btn-footer solid">Panier (0)</button>
        <button id="btn-dl-selected" class="btn-footer solid" style="display:none;">Télécharger (0)</button>
        <button id="btn-clear-cart" class="btn-footer solid" style="display:none;">Vider</button>
    </div>

    <script type="module" src="popup.js"></script>
</body>
</html>

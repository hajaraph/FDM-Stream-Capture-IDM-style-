<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        :root {
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.85);
            --border: rgba(226, 232, 240, 0.8);
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #2563eb;
            --accent-soft: rgba(37, 99, 235, 0.1);
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            width: 380px;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-height: 520px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 16px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand { display: flex; align-items: center; gap: 12px; }

        .logo {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
        }

        .logo svg { width: 18px; height: 18px; color: white; }

        #header-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }

        .search-container {
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-wrapper svg {
            position: absolute;
            left: 10px;
            width: 14px;
            height: 14px;
            color: var(--text-muted);
        }

        #stream-search {
            width: 100%;
            padding: 8px 12px 8px 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            font-size: 12px;
            outline: none;
            transition: all 0.2s ease;
        }

        #stream-search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        #stream-list {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            min-height: 200px;
        }

        #stream-list::-webkit-scrollbar { width: 5px; }
        #stream-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .tl-section { margin-bottom: 20px; }

        .tl-label {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.05em; color: var(--text-muted);
            margin-bottom: 10px; padding-left: 4px;
        }

        .tl-item {
            margin-bottom: 10px;
            animation: slideIn 0.3s var(--ease) both;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tl-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            transition: all 0.2s var(--ease);
            position: relative;
            overflow: hidden;
        }

        .tl-card:hover {
            border-color: #cbd5e1;
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .tl-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }

        .tl-type-badge {
            font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px;
            color: white; text-transform: uppercase;
        }

        .tl-type-badge.youtube { background: #ef4444; }
        .tl-type-badge.manifests { background: #10b981; }
        .tl-type-badge.videos { background: #3b82f6; }
        .tl-type-badge.segments { background: #f59e0b; }
        .tl-type-badge.others { background: #64748b; }

        .tl-time { font-size: 10px; color: var(--text-muted); font-weight: 500; }

        .tl-title {
            font-size: 13px; font-weight: 600; color: var(--text);
            margin-bottom: 4px; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            line-clamp: 2;
        }

        .tl-url {
            font-size: 9px; color: var(--text-muted);
            font-family: inherit;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            background: #f1f5f9; padding: 2px 6px; border-radius: 4px;
        }

        .tl-actions { display: flex; gap: 8px; margin-top: 10px; }

        .tl-btn {
            flex: 1; padding: 8px; border-radius: 8px; border: none;
            font-size: 11px; font-weight: 600; cursor: pointer;
            transition: all 0.15s ease; display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        .tl-btn svg { width: 14px; height: 14px; }

        .tl-btn-dl { background: #0f172a; color: white; }
        .tl-btn-dl:hover { background: #1e293b; box-shadow: 0 4px 10px rgba(15, 23, 42, 0.2); }

        .tl-btn-cp { background: #f1f5f9; color: #475569; }
        .tl-btn-cp:hover { background: #e2e8f0; color: #1e293b; }

        .footer {
            padding: 14px 16px; border-top: 1px solid var(--border);
            background: var(--surface); backdrop-filter: blur(12px);
            display: flex; gap: 8px;
        }

        .btn-footer {
            flex: 1; padding: 10px; border-radius: 10px;
            border: 1px solid var(--border); background: white;
            color: var(--text-secondary); font-size: 11px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease;
        }

        .btn-footer:hover { border-color: var(--text-muted); background: #f8fafc; }
        .btn-footer.solid { background: #0f172a; color: white; border-color: #0f172a; }
        .btn-footer.solid:hover { background: #1e293b; }

        .empty { text-align: center; padding: 60px 40px; color: var(--text-muted); }
        .empty svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.15; }
        .empty p { font-size: 13px; font-weight: 500; }

        /* Icon Button */
        .icon-btn {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: none; border: none; cursor: pointer;
            color: var(--text-secondary); border-radius: 8px; transition: all 0.15s;
        }
        .icon-btn:hover { background: var(--accent-soft); color: var(--accent); }

        /* Custom Checkbox */
        .checkbox-wrapper { display: flex; align-items: center; cursor: pointer; }
        .cb-batch { position: absolute; opacity: 0; width: 0; }
        .cb-visual {
            width: 20px; height: 20px; border: 2px solid #cbd5e1; border-radius: 6px;
            background-color: white; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .cb-batch:checked + .cb-visual { background-color: var(--accent); border-color: var(--accent); }
        .cb-batch:checked + .cb-visual::after { content: "✓"; color: white; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </div>
            <span id="header-title">FDM Stream Capture</span>
        </div>
        <button id="open-settings" class="icon-btn" title="Paramètres">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </header>

    <div class="search-container">
        <div class="search-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="stream-search" placeholder="Rechercher un flux...">
        </div>
    </div>

    <div id="stream-list"></div>

    <div class="footer">
        <button id="btn-scan-page" class="btn-footer">Scanner</button>
        <button id="btn-show-cart" class="btn-footer solid">Panier (0)</button>
        <button id="btn-dl-selected" class="btn-footer solid" style="display:none;">Télécharger (0)</button>
        <button id="btn-clear-cart" class="btn-footer solid" style="display:none;">Vider</button>
    </div>

    <script src="browser-compat.js"></script>
    <script src="constants.js"></script>
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="popup.js"></script>
</body>
</html>

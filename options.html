<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Paramètres - Stream Catcher</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; color: #0f172a; padding: 20px; line-height: 1.5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { margin-top: 0; color: #1e293b; font-size: 24px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px; }
        .setting-item { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .setting-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        label { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
        input[type="checkbox"] { width: 18px; height: 18px; margin-top: 3px; cursor: pointer; }
        .text { flex: 1; }
        .title { font-weight: 600; font-size: 15px; margin-bottom: 4px; color: #334155; }
        .desc { font-size: 13px; color: #64748b; }
        .nested { margin-left: 30px; margin-top: 12px; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: #475569;}
        input[type="number"] { width: 60px; padding: 6px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit; font-size: 14px; text-align: center; }
        .status { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; background: #10b981; color: white; border-radius: 8px; font-weight: 500; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); display: none; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <h1 data-i18n="optionsTitle">Paramètres Profil</h1>
        
        <div class="setting-item">
            <label>
                <input type="checkbox" id="showButton">
                <div class="text">
                    <div class="title" data-i18n="optShowButtonTitle">Bouton de téléchargement sur les vidéos</div>
                    <div class="desc" data-i18n="optShowButtonDesc">Affiche un élégant bouton de téléchargement flottant au survol d'un lecteur vidéo pris en charge (HTML5).</div>
                </div>
            </label>
        </div>

        <div class="setting-item">
            <label>
                <input type="checkbox" id="minSizeEnabled">
                <div class="text">
                    <div class="title" data-i18n="optMinSizeTitle">Filtre "Anti-Bruit" (Taille Minimale)</div>
                    <div class="desc" data-i18n="optMinSizeDesc">Ignore les petites vidéos (ex: pubs, effets sonores, icônes) pour ne capturer que les vrais médias. Évite la pollution de la liste !</div>
                </div>
            </label>
            <div class="nested">
                <span data-i18n="optMinSizeLabel">Taille minimale (Mo) :</span>&nbsp;<input type="number" id="minSizeMB" min="0" step="1">
            </div>
        </div>

        <div class="setting-item">
            <label>
                <input type="checkbox" id="detectSubtitles">
                <div class="text">
                    <div class="title" data-i18n="optSubtitlesTitle">Détecter les sous-titres (.vtt, .srt)</div>
                    <div class="desc" data-i18n="optSubtitlesDesc">Détecte et ajoute les fichiers de sous-titres liés à la vidéo dans la liste des flux capturés pour pouvoir les sauver séparément.</div>
                </div>
            </label>
        </div>

        <div class="setting-item">
            <label>
                <input type="checkbox" id="scanHiddenStreams">
                <div class="text">
                    <div class="title" data-i18n="optHiddenStreamsTitle">Scan profond des flux cachés (JS Sniffer)</div>
                    <div class="desc" data-i18n="optHiddenStreamsDesc">Analyse dynamiquement le code source et les scripts de la page courante pour extraire les URL cachées (.m3u8, .mp4, etc.) invisibles aux méthodes classiques.</div>
                </div>
            </label>
        </div>

        <div class="setting-item">
            <label>
                <input type="checkbox" id="smartNaming">
                <div class="text">
                    <div class="title" data-i18n="optSmartNamingTitle">Nommage Intelligent (Style IDM)</div>
                    <div class="desc" data-i18n="optSmartNamingDesc">Nettoie automatiquement les titres des vidéos (supprime 'Watch Online', les noms de sites, etc.) pour des fichiers bien nommés dans FDM.</div>
                </div>
            </label>
        </div>
    </div>
    
    <div id="status" class="status" data-i18n="optSaved">Paramètres enregistrés</div>
    
    <script src="options.js"></script>
</body>
</html>
